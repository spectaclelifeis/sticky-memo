<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8x8 한자노트 TODO (꽉 찬 X표)</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

        :root {
            --note-color: #ffffff;
            --line-color: #c8d6e5;
            --header-bg: #f8f9fa;
            --header-text: #222222;
            --x-color: #ff4d4d;
            --cell-width: 102px;
            --cell-height: 64px;
            --sidebar-width: 280px;
            --accent: #1976d2;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            margin: 0;
            padding: 40px 20px;
            background-color: #f0f2f5;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            box-sizing: border-box;
            overflow: hidden;
        }

        .app {
            position: relative;
            display: flex;
            gap: 20px;
            width: min(1280px, 100%);
            align-items: flex-start;
            height: 100%;
        }

        .app-help-btn {
            position: absolute;
            top: -36px;
            left: 0;
            z-index: 2;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: #ffffff;
            border: 1px solid #dbe4ef;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            padding: 14px;
            max-height: 100%;
            overflow-y: auto;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 10px;
            gap: 8px;
            flex-wrap: wrap;
        }

        .help-btn {
            width: 30px;
            height: 30px;
            border: 1px solid #c8d8ec;
            border-radius: 999px;
            background: #f7fbff;
            color: #33506f;
            font-weight: 800;
            cursor: pointer;
            flex-shrink: 0;
        }

        .help-btn:hover {
            background: #eaf2ff;
        }

        .mode-btn {
            border: 1px solid #b9cbe4;
            border-radius: 10px;
            padding: 7px 10px;
            background: #f4f8ff;
            color: #244261;
            font: inherit;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
        }

        .action-btn {
            border: 1px solid #b9cbe4;
            border-radius: 10px;
            padding: 7px 8px;
            background: #f4f8ff;
            color: #244261;
            font: inherit;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
        }

        .action-btn:hover {
            background: #eaf2ff;
        }

        .mode-btn:hover {
            background: #eaf2ff;
        }

        .mode-btn.active {
            background: #f4f8ff;
            border-color: #b9cbe4;
            color: #244261;
        }

        .sidebar h2 {
            margin: 0 0 10px;
            font-size: 1rem;
            color: #243447;
        }

        .current-week {
            margin: 0 0 10px;
            color: #41566e;
            font-size: 0.88rem;
            line-height: 1.35;
            word-break: break-all;
        }

        .nav-tree {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .tree-row {
            border: 1px solid transparent;
            background: #f8fbff;
            color: #234;
            border-radius: 8px;
            padding: 7px 8px;
            cursor: pointer;
            text-align: left;
            font: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
        }

        .tree-row:hover {
            background: #eef6ff;
        }

        .tree-row.active {
            border-color: var(--accent);
            background: #e3f2ff;
            color: #0f4f8f;
            font-weight: 700;
        }

        .tree-row.active .tree-label.page {
            font-weight: 400;
        }

        .tree-row.kbd-focus {
            box-shadow: inset 0 0 0 1px #7ea6d6;
        }

        .tree-delete-btn {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            color: #a0b0c0;
            border-radius: 4px;
            font-size: 0.75rem;
            transition: opacity 0.12s, color 0.12s, background 0.12s;
        }

        .tree-row:hover .tree-delete-btn {
            opacity: 1;
        }

        .tree-delete-btn:hover {
            color: #e05555;
            background: #fbe8e8;
        }

        .tree-inline-input {
            flex: 1;
            min-width: 0;
            border: none;
            border-bottom: 1.5px solid var(--accent);
            background: transparent;
            font: inherit;
            color: inherit;
            outline: none;
            padding: 0;
            margin: 0;
        }

        #deckPicker {
            display: none;
            position: fixed;
            z-index: 9999;
            background: #fff;
            border: 1px solid #c2d5ed;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.14);
            padding: 8px;
            flex-direction: column;
            gap: 0;
            max-height: 60vh;
            overflow-y: auto;
        }

        #deckPicker.open {
            display: flex;
        }

        .deck-picker-item {
            border-radius: 7px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.88rem;
            color: #1f3042;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .deck-picker-item:hover {
            background: #e3f2ff;
            color: #0f4f8f;
        }

        .deck-picker-item.is-page {
            color: #1f3042;
        }

        .deck-picker-item.is-folder {
            font-weight: 600;
            color: #41566e;
        }

        .tree-expander {
            width: 16px;
            color: #5d7390;
            font-size: 0.72rem;
            text-align: center;
            flex-shrink: 0;
        }

        .tree-label {
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tree-label.folder {
            font-weight: 600;
            color: #41566e;
        }

        .tree-label.page {
            color: #1f3042;
        }

        .empty-nav {
            color: #6e7f92;
            font-size: 0.9rem;
            margin-top: 6px;
        }

        .main {
            position: relative;
            flex: 1;
            display: flex;
            justify-content: center;
            overflow-y: hidden;
        }

        .notebook {
            display: grid;
            grid-template-columns: repeat(8, var(--cell-width));
            grid-template-rows: repeat(8, var(--cell-height));
            border: 2px solid #333;
            background-color: var(--note-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .cell {
            position: relative;
            border: 0.5px solid var(--line-color);
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s;
        }

        .header-cell {
            background-color: var(--header-bg);
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--header-text);
            border-bottom: 2px solid #555;
            text-align: center;
            pointer-events: none;
        }

        .cell textarea {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            resize: none;
            padding: 0 8px;
            text-align: center;
            font-size: 0.95rem;
            line-height: 1.35;
            outline: none;
            font-family: inherit;
            box-sizing: border-box;
            z-index: 1;
            overflow: hidden;
        }

        .cell:not(.header-cell):hover {
            background-color: #fbfbfb;
        }

        .cell.range-selected,
        .cell.range-anchor {
            box-shadow: inset 0 0 0 1px #9ebfe2;
            background-color: transparent;
        }

        .cell.completed::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            background:
                linear-gradient(to top right, transparent calc(50% - 1px), var(--x-color) 50%, transparent calc(50% + 1px)),
                linear-gradient(to bottom right, transparent calc(50% - 1px), var(--x-color) 50%, transparent calc(50% + 1px));
        }

        .header-cell:nth-child(8) {
            color: #0984e3;
        }

        @media (max-width: 1100px) {
            .app {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: none;
                position: static;
            }

            .main {
                width: 100%;
                overflow-x: auto;
                justify-content: flex-start;
            }

            .notebook {
                min-width: calc(var(--cell-width) * 8);
            }
        }
    </style>
</head>
<body>

<div class="app">
    <button class="help-btn app-help-btn" id="helpBtn" type="button">?</button>
    <aside class="sidebar">
        <div class="sidebar-header">
            <button class="mode-btn active" id="weeklyBtn" type="button">weekly</button>
            <button class="mode-btn" id="untitledBtn" type="button">무제</button>
            <button class="action-btn" id="importBtn" type="button">불러오기</button>
            <button class="action-btn" id="exportBtn" type="button">내보내기</button>
        </div>
        <div class="current-week" id="currentWeekLabel"></div>
        <div class="nav-tree" id="weekList"></div>
        <p class="empty-nav" id="emptyNav" hidden>저장된 주차가 없습니다.</p>
    </aside>

    <main class="main">
        <div class="notebook" id="notebook"></div>
    </main>
</div>

<div id="deckPicker"></div>
<input id="importFileInput" type="file" accept="application/json,.json" hidden />

<script>
    const notebook = document.getElementById('notebook');
    const weekList = document.getElementById('weekList');
    const currentWeekLabel = document.getElementById('currentWeekLabel');
    const emptyNav = document.getElementById('emptyNav');
    const helpBtn = document.getElementById('helpBtn');
    const weeklyBtn = document.getElementById('weeklyBtn');
    const untitledBtn = document.getElementById('untitledBtn');
    const importBtn = document.getElementById('importBtn');
    const exportBtn = document.getElementById('exportBtn');
    const importFileInput = document.getElementById('importFileInput');

    const days = ['월', '화', '수', '목', '금', '토', '일'];
    const GRID_ROWS = 8;
    const GRID_COLS = 8;
    const ROOT_PATH = '99.etc';
    const LEGACY_WEEKLY_PATH = `${ROOT_PATH}::weekly`;
    const LEGACY_UNTITLED_PATH = `${ROOT_PATH}::무제`;

    function normalizeWeekKeyFormat(weekKey) {
        const matched = /^([0-9]{2}|[0-9]{4})_w([0-9]{2})$/i.exec(String(weekKey || ''));
        if (!matched) {
            return weekKey;
        }
        const year2 = String(Number(matched[1]) % 100).padStart(2, '0');
        return `${year2}_w${matched[2]}`;
    }

    function flattenPathToRoot(path) {
        if (typeof path !== 'string') {
            return path;
        }
        if (path.startsWith(`${LEGACY_WEEKLY_PATH}::`)) {
            return `${ROOT_PATH}::${path.slice((`${LEGACY_WEEKLY_PATH}::`).length)}`;
        }
        if (path.startsWith(`${LEGACY_UNTITLED_PATH}::`)) {
            return `${ROOT_PATH}::${path.slice((`${LEGACY_UNTITLED_PATH}::`).length)}`;
        }
        if (path === LEGACY_WEEKLY_PATH || path === LEGACY_UNTITLED_PATH) {
            return ROOT_PATH;
        }
        return path;
    }

    let selectedPath = '';
    let storeCache = {};
    let collapsedSet = new Set();
    let saveTimer = null;
    let activeMode = 'weekly';
    let kbdPath = '';
    let measureBox = null;
    let cellRangeAnchor = null;
    let cellRangeFocus = null;
    let pendingCellRange = null;

    const storageBridge = {
        async load() {
            if (window.pywebview && window.pywebview.api && window.pywebview.api.load_data) {
                try {
                    const data = await window.pywebview.api.load_data();
                    return data && typeof data === 'object' ? data : {};
                } catch (error) {
                    console.error('Python 저장 데이터 로드 실패:', error);
                    return {};
                }
            }

            try {
                const raw = localStorage.getItem('todo_week_data');
                return raw ? JSON.parse(raw) : {};
            } catch (error) {
                console.error('브라우저 저장 데이터 읽기 실패:', error);
                return {};
            }
        },
        async save(store) {
            if (window.pywebview && window.pywebview.api && window.pywebview.api.save_data) {
                try {
                    await window.pywebview.api.save_data(store);
                    return;
                } catch (error) {
                    console.error('Python 저장 실패:', error);
                }
            }

            localStorage.setItem('todo_week_data', JSON.stringify(store));
        }
    };

    function normalizeStore(raw) {
        const normalized = {
            decks: [],
            pages: {},
            collapsed: []
        };

        if (!raw || typeof raw !== 'object') {
            return normalized;
        }

        const hasNewSchema = Array.isArray(raw.decks) || raw.pages;
        if (hasNewSchema) {
            normalized.decks = Array.isArray(raw.decks)
                ? [...new Set(raw.decks.map((path) => flattenPathToRoot(path)))]
                : normalized.decks;
            normalized.pages = raw.pages && typeof raw.pages === 'object' ? raw.pages : {};
            normalized.collapsed = Array.isArray(raw.collapsed)
                ? raw.collapsed.map((path) => flattenPathToRoot(path))
                : [];

            // 기존 YYYY_wNN 키를 YY_wNN 키로 자동 마이그레이션 + legacy 하위폴더 평탄화
            const migratedPages = {};
            Object.entries(normalized.pages).forEach(([path, page]) => {
                let targetPath = flattenPathToRoot(path);
                if (!page || page.kind !== 'weekly') {
                    migratedPages[targetPath] = page;
                    return;
                }

                const segs = targetPath.split('::');
                const currentKey = page.weekKey || segs[segs.length - 1];
                const nextKey = normalizeWeekKeyFormat(currentKey);

                page.weekKey = nextKey;
                page.title = nextKey;

                segs[segs.length - 1] = nextKey;
                targetPath = segs.join('::');
                migratedPages[targetPath] = page;
            });

            normalized.pages = migratedPages;
            normalized.decks = [...new Set(normalized.decks)];
            normalized.collapsed = [...new Set(normalized.collapsed)];
        } else {
            Object.keys(raw).forEach((weekKey) => {
                if (!/^([0-9]{2}|[0-9]{4})_w\d{2}$/i.test(weekKey)) {
                    return;
                }
                const normalizedWeekKey = normalizeWeekKeyFormat(weekKey);
                const path = `${ROOT_PATH}::${normalizedWeekKey}`;
                normalized.decks.push(path);
                normalized.pages[path] = {
                    kind: 'weekly',
                    weekKey: normalizedWeekKey,
                    title: normalizedWeekKey,
                    cells: Array.isArray(raw[weekKey]?.cells) ? raw[weekKey].cells : [],
                    savedAt: raw[weekKey]?.savedAt || Date.now()
                };
            });
        }

        ensureRootDecks(normalized);
        return normalized;
    }

    function ensureRootDecks(targetStore = storeCache) {
        if (!Array.isArray(targetStore.decks)) {
            targetStore.decks = [];
        }
        targetStore.decks = targetStore.decks
            .map((path) => flattenPathToRoot(path))
            .filter((path) => path !== LEGACY_WEEKLY_PATH && path !== LEGACY_UNTITLED_PATH);
        targetStore.decks = [...new Set(targetStore.decks)];

        if (targetStore.pages && typeof targetStore.pages === 'object') {
            const remappedPages = {};
            Object.entries(targetStore.pages).forEach(([path, page]) => {
                remappedPages[flattenPathToRoot(path)] = page;
            });
            targetStore.pages = remappedPages;
        }

        if (targetStore.collapsed && Array.isArray(targetStore.collapsed)) {
            targetStore.collapsed = [...new Set(targetStore.collapsed
                .map((path) => flattenPathToRoot(path))
                .filter((path) => path !== LEGACY_WEEKLY_PATH && path !== LEGACY_UNTITLED_PATH))];
        }
    }

    function pathParts(path) {
        return path.split('::').filter(Boolean);
    }

    function leafName(path) {
        const parts = pathParts(path);
        return parts[parts.length - 1] || path;
    }

    function parentPath(path) {
        const parts = pathParts(path);
        if (parts.length <= 1) {
            return '';
        }
        return parts.slice(0, -1).join('::');
    }

    function isPagePath(path) {
        return !!storeCache.pages[path];
    }

    function resolveTargetDeckForCreate() {
        let targetDeck = '';

        if (selectedPath) {
            targetDeck = isPagePath(selectedPath) ? parentPath(selectedPath) : selectedPath;
        }

        // Walk up until targetDeck is not a page and has no page ancestor
        while (targetDeck) {
            if (!isPagePath(targetDeck)) {
                const parts = pathParts(targetDeck);
                const hasPageAnc = parts.some((_, i) => i < parts.length - 1 && isPagePath(parts.slice(0, i + 1).join('::')));
                if (!hasPageAnc) break;
            }
            targetDeck = parentPath(targetDeck);
        }

        if (!targetDeck) {
            const topDecks = [...new Set(storeCache.decks.filter((path) => !path.includes('::') && !isPagePath(path)))]
                .sort((a, b) => a.localeCompare(b, 'ko'));
            if (topDecks.length === 0) {
                addDeckWithParents(ROOT_PATH);
                targetDeck = ROOT_PATH;
                selectedPath = ROOT_PATH;
            } else if (topDecks.includes(ROOT_PATH)) {
                targetDeck = ROOT_PATH;
            } else {
                targetDeck = topDecks[0];
            }
        }

        addDeckWithParents(targetDeck);
        return targetDeck;
    }

    function addDeckWithParents(path) {
        const parts = pathParts(path);
        let current = '';
        parts.forEach((part) => {
            current = current ? `${current}::${part}` : part;
            if (!storeCache.decks.includes(current)) {
                storeCache.decks.push(current);
            }
        });
    }

    function toSortableValue(weekKey) {
        const parsed = /^([0-9]{2}|[0-9]{4})_w([0-9]{2})$/i.exec(weekKey);
        if (!parsed) {
            return 0;
        }
        const year = parsed[1].length === 2 ? (2000 + Number(parsed[1])) : Number(parsed[1]);
        return year * 100 + Number(parsed[2]);
    }

    function getPageByPath(path) {
        return storeCache.pages[path] || null;
    }

    async function persistStore() {
        storeCache.collapsed = Array.from(collapsedSet);
        await storageBridge.save(storeCache);
    }

    function pickInitialPathFromStore() {
        const pagePaths = Object.keys(storeCache.pages);
        const weeklyPaths = pagePaths
            .filter((path) => storeCache.pages[path].kind === 'weekly')
            .sort((a, b) => toSortableValue(leafName(b)) - toSortableValue(leafName(a)));
        if (weeklyPaths.length > 0) {
            return weeklyPaths[0];
        }
        return pagePaths.sort((a, b) => a.localeCompare(b, 'ko'))[0] || '';
    }

    function refreshAfterStoreChange(preferredPath = '') {
        ensureRootDecks();
        collapsedSet = new Set(storeCache.collapsed || []);
        const nextPath = preferredPath && (storeCache.pages[preferredPath] || storeCache.decks.includes(preferredPath))
            ? preferredPath
            : pickInitialPathFromStore();

        if (nextPath && isPagePath(nextPath)) {
            selectedPath = nextPath;
            setMode(storeCache.pages[nextPath].kind === 'weekly' ? 'weekly' : 'untitled');
            renderNavigation(nextPath);
            renderNotebook(nextPath);
            kbdPath = nextPath;
            focusKbdPath(nextPath);
            return;
        }

        selectedPath = nextPath;
        renderNavigation(nextPath);
        notebook.innerHTML = '';
        renderStatus('페이지가 없습니다. weekly 또는 무제 버튼으로 생성하세요.');
    }

    async function exportStoreAsJson() {
        await saveCurrentPage();
        const now = new Date();
        const stamp = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}_${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}${String(now.getSeconds()).padStart(2, '0')}`;
        const filename = `todo-backup-${stamp}.json`;

        if (window.pywebview && window.pywebview.api && window.pywebview.api.export_backup) {
            const result = await window.pywebview.api.export_backup(storeCache, filename);
            if (result && result.ok) {
                alert(`내보내기 완료\n파일명: ${filename}`);
                return;
            }
            throw new Error((result && result.message) || '백업 저장 실패');
        }

        const payload = JSON.stringify(storeCache, null, 2);
        const blob = new Blob([payload], { type: 'application/json;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 0);
        alert(`내보내기 완료\n파일명: ${filename}`);
    }

    async function importStoreFromFile(file) {
        const text = await file.text();
        const parsed = JSON.parse(text);
        storeCache = normalizeStore(parsed);
        await persistStore();
        refreshAfterStoreChange();
    }

    function setMode(mode) {
        activeMode = mode;
        weeklyBtn.classList.toggle('active', mode === 'weekly');
        untitledBtn.classList.toggle('active', mode === 'untitled');
    }

    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        return weekNo;
    }

    function getMondayOfWeek(baseDate = new Date()) {
        const today = new Date(baseDate);
        const dayOfWeek = today.getDay();
        const diff = today.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
        return new Date(today.setDate(diff));
    }

    function makeWeekKey(monday) {
        const year2 = String(monday.getFullYear() % 100).padStart(2, '0');
        return `${year2}_w${String(getWeekNumber(monday)).padStart(2, '0')}`;
    }

    function parseWeekKey(weekKey) {
        const matched = /^([0-9]{2}|[0-9]{4})_w([0-9]{2})$/i.exec(weekKey);
        if (!matched) {
            return null;
        }
        const year = matched[1].length === 2 ? (2000 + Number(matched[1])) : Number(matched[1]);
        return {
            year,
            week: Number(matched[2])
        };
    }

    function mondayFromIsoWeek(year, week) {
        const jan4 = new Date(year, 0, 4);
        const jan4Day = jan4.getDay() || 7;
        const week1Monday = new Date(jan4);
        week1Monday.setDate(jan4.getDate() - jan4Day + 1);
        const targetMonday = new Date(week1Monday);
        targetMonday.setDate(week1Monday.getDate() + (week - 1) * 7);
        return targetMonday;
    }

    function getHeaderTexts(monday) {
        const colTexts = [];
        for (let i = 0; i < 7; i++) {
            const date = new Date(monday);
            date.setDate(monday.getDate() + i);
            colTexts.push(`${days[i]}(${date.getMonth() + 1}/${date.getDate()})`);
        }
        colTexts.push(makeWeekKey(monday));
        return colTexts;
    }

    function getCellIndex(kind, row, col) {
        if (kind === 'weekly' && row === 0) {
            return -1;
        }
        return kind === 'weekly' ? ((row - 1) * GRID_COLS + col) : (row * GRID_COLS + col);
    }

    function getCellPayload() {
        const cells = Array.from(notebook.querySelectorAll('.cell[data-editable="1"]'));
        return cells.map((cell) => {
            const textarea = cell.querySelector('textarea');
            return {
                text: textarea ? textarea.value : '',
                completed: cell.classList.contains('completed')
            };
        });
    }

    async function saveCurrentPage() {
        if (selectedPath && isPagePath(selectedPath)) {
            const page = storeCache.pages[selectedPath];
            page.cells = getCellPayload();
            page.savedAt = Date.now();
        }
        await persistStore();
        renderStatus(`자동저장: ${new Date().toLocaleTimeString()}`);
    }

    function renderAutoSavedStatus() {
        renderStatus(`자동저장: ${new Date().toLocaleTimeString()}`);
    }

    function scheduleAutoSave() {
        if (saveTimer) {
            clearTimeout(saveTimer);
        }
        saveTimer = setTimeout(() => {
            saveCurrentPage();
        }, 250);
    }

    function centerTextareaContent(textarea) {
        if (!measureBox) {
            measureBox = document.createElement('div');
            measureBox.style.position = 'absolute';
            measureBox.style.left = '-99999px';
            measureBox.style.top = '-99999px';
            measureBox.style.visibility = 'hidden';
            measureBox.style.pointerEvents = 'none';
            measureBox.style.whiteSpace = 'pre-wrap';
            measureBox.style.wordBreak = 'break-word';
            measureBox.style.overflowWrap = 'break-word';
            document.body.appendChild(measureBox);
        }

        const style = window.getComputedStyle(textarea);
        const horizontalPadding = 16; // left 8 + right 8
        const innerWidth = Math.max(1, textarea.clientWidth - horizontalPadding);

        measureBox.style.width = `${innerWidth}px`;
        measureBox.style.fontFamily = style.fontFamily;
        measureBox.style.fontSize = style.fontSize;
        measureBox.style.fontWeight = style.fontWeight;
        measureBox.style.letterSpacing = style.letterSpacing;
        measureBox.style.lineHeight = style.lineHeight;

        const text = textarea.value && textarea.value.length > 0 ? textarea.value : ' ';
        measureBox.textContent = text.endsWith('\n') ? `${text} ` : text;

        const contentHeight = Math.max(1, Math.ceil(measureBox.getBoundingClientRect().height));
        const cellHeight = textarea.clientHeight;
        const freeHeight = Math.max(0, cellHeight - contentHeight);
        const topPadding = Math.floor(freeHeight / 2);
        const bottomPadding = Math.max(0, cellHeight - contentHeight - topPadding);
        textarea.style.paddingTop = `${topPadding}px`;
        textarea.style.paddingBottom = `${bottomPadding}px`;
    }

    function centerAllTextareas() {
        notebook.querySelectorAll('textarea').forEach((textarea) => {
            centerTextareaContent(textarea);
        });
    }

    function clearCellRange() {
        cellRangeAnchor = null;
        cellRangeFocus = null;
        pendingCellRange = null;
        notebook.querySelectorAll('.cell.range-selected, .cell.range-anchor').forEach((cell) => {
            cell.classList.remove('range-selected', 'range-anchor');
        });
    }

    function getNormalizedCellRange() {
        if (!cellRangeAnchor || !cellRangeFocus || cellRangeAnchor.kind !== cellRangeFocus.kind) {
            return null;
        }
        return {
            kind: cellRangeAnchor.kind,
            startRow: Math.min(cellRangeAnchor.row, cellRangeFocus.row),
            endRow: Math.max(cellRangeAnchor.row, cellRangeFocus.row),
            startCol: Math.min(cellRangeAnchor.col, cellRangeFocus.col),
            endCol: Math.max(cellRangeAnchor.col, cellRangeFocus.col),
            anchorRow: cellRangeAnchor.row,
            anchorCol: cellRangeAnchor.col,
            focusRow: cellRangeFocus.row,
            focusCol: cellRangeFocus.col
        };
    }

    function hasMultiCellRange() {
        const range = getNormalizedCellRange();
        if (!range) {
            return false;
        }
        return range.startRow !== range.endRow || range.startCol !== range.endCol;
    }

    function applyCellRangeStyles() {
        const range = getNormalizedCellRange();
        notebook.querySelectorAll('.cell.range-selected, .cell.range-anchor').forEach((cell) => {
            cell.classList.remove('range-selected', 'range-anchor');
        });
        if (!range || (range.startRow === range.endRow && range.startCol === range.endCol)) {
            return;
        }

        for (let row = range.startRow; row <= range.endRow; row++) {
            for (let col = range.startCol; col <= range.endCol; col++) {
                const selector = `.cell[data-editable="1"][data-kind="${range.kind}"][data-logical-row="${row}"][data-logical-col="${col}"]`;
                const cell = notebook.querySelector(selector);
                if (cell) {
                    cell.classList.add('range-selected');
                }
            }
        }
    }

    function setCellRange(kind, anchorRow, anchorCol, focusRow, focusCol) {
        cellRangeAnchor = { kind, row: anchorRow, col: anchorCol };
        cellRangeFocus = { kind, row: focusRow, col: focusCol };
        applyCellRangeStyles();
    }

    function clampLogicalCell(kind, row, col) {
        return {
            row: Math.max(0, Math.min(getEditableRowCount(kind) - 1, row)),
            col: Math.max(0, Math.min(GRID_COLS - 1, col))
        };
    }

    function buildCellRangeText() {
        const range = getNormalizedCellRange();
        if (!range) {
            return '';
        }
        const lines = [];
        for (let row = range.startRow; row <= range.endRow; row++) {
            const values = [];
            for (let col = range.startCol; col <= range.endCol; col++) {
                const selector = `.cell[data-editable="1"][data-kind="${range.kind}"][data-logical-row="${row}"][data-logical-col="${col}"] textarea`;
                const textarea = notebook.querySelector(selector);
                values.push(textarea ? textarea.value : '');
            }
            lines.push(values.join('\t'));
        }
        return lines.join('\n');
    }

    function clearSelectedCells() {
        const range = getNormalizedCellRange();
        if (!range || !hasMultiCellRange()) {
            return false;
        }

        let changed = false;
        for (let row = range.startRow; row <= range.endRow; row++) {
            for (let col = range.startCol; col <= range.endCol; col++) {
                const selector = `.cell[data-editable="1"][data-kind="${range.kind}"][data-logical-row="${row}"][data-logical-col="${col}"] textarea`;
                const target = notebook.querySelector(selector);
                if (!target) {
                    continue;
                }
                if (target.value !== '') {
                    target.value = '';
                    changed = true;
                }
                centerTextareaContent(target);
                const targetCell = target.closest('.cell');
                if (targetCell && targetCell.classList.contains('completed')) {
                    targetCell.classList.remove('completed');
                    changed = true;
                }
            }
        }

        if (changed) {
            scheduleAutoSave();
        }
        return true;
    }

    function focusCellByLogicalPosition(kind, logicalRow, logicalCol, options = {}) {
        const selector = `.cell[data-editable="1"][data-kind="${kind}"][data-logical-row="${logicalRow}"][data-logical-col="${logicalCol}"] textarea`;
        const target = notebook.querySelector(selector);
        if (!target) {
            return;
        }
        pendingCellRange = options.pendingCellRange || {
            kind,
            anchorRow: logicalRow,
            anchorCol: logicalCol,
            focusRow: logicalRow,
            focusCol: logicalCol
        };
        target.focus();
        const end = target.value.length;
        target.setSelectionRange(end, end);
    }

    function getEditableRowCount(kind) {
        return kind === 'weekly' ? (GRID_ROWS - 1) : GRID_ROWS;
    }

    function applyGridPaste(kind, startRow, startCol, rawText) {
        const normalizedText = String(rawText || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
        // 셀 분산 붙여넣기는 탭 구분 데이터에서만 동작한다.
        if (!normalizedText.includes('\t')) {
            return false;
        }

        const rows = normalizedText.split('\n');
        if (rows.length > 1 && rows[rows.length - 1] === '') {
            rows.pop();
        }
        if (rows.length === 0) {
            return false;
        }

        const rowLimit = getEditableRowCount(kind);
        let wroteAny = false;

        rows.forEach((rowText, rowOffset) => {
            const values = rowText.split('\t');
            values.forEach((value, colOffset) => {
                const logicalRow = startRow + rowOffset;
                const logicalCol = startCol + colOffset;
                if (logicalRow < 0 || logicalCol < 0 || logicalRow >= rowLimit || logicalCol >= GRID_COLS) {
                    return;
                }
                const selector = `.cell[data-editable="1"][data-kind="${kind}"][data-logical-row="${logicalRow}"][data-logical-col="${logicalCol}"] textarea`;
                const target = notebook.querySelector(selector);
                if (!target) {
                    return;
                }
                target.value = value;
                centerTextareaContent(target);

                const targetCell = target.closest('.cell');
                if (targetCell && targetCell.classList.contains('completed')) {
                    targetCell.classList.remove('completed');
                }
                wroteAny = true;
            });
        });

        if (wroteAny) {
            scheduleAutoSave();
        }
        return wroteAny;
    }

    function handleCellKeyboard(event, cell, kind, logicalRow, logicalCol) {
        if (!event.ctrlKey && !event.metaKey && !event.altKey && event.key === '/') {
            event.preventDefault();
            cell.classList.toggle('completed');
            scheduleAutoSave();
            return;
        }

        if (!event.ctrlKey || event.metaKey || event.altKey) {
            return;
        }

        let nextRow = logicalRow;
        let nextCol = logicalCol;

        if (event.key === 'ArrowUp') {
            nextRow -= 1;
        } else if (event.key === 'ArrowDown') {
            nextRow += 1;
        } else if (event.key === 'ArrowLeft') {
            nextCol -= 1;
        } else if (event.key === 'ArrowRight') {
            nextCol += 1;
        } else {
            return;
        }

        event.preventDefault();
        const clamped = clampLogicalCell(kind, nextRow, nextCol);
        if (event.shiftKey) {
            const anchor = cellRangeAnchor && cellRangeAnchor.kind === kind
                ? cellRangeAnchor
                : { kind, row: logicalRow, col: logicalCol };
            setCellRange(kind, anchor.row, anchor.col, clamped.row, clamped.col);
            focusCellByLogicalPosition(kind, clamped.row, clamped.col, {
                pendingCellRange: {
                    kind,
                    anchorRow: anchor.row,
                    anchorCol: anchor.col,
                    focusRow: clamped.row,
                    focusCol: clamped.col
                }
            });
            return;
        }
        focusCellByLogicalPosition(kind, clamped.row, clamped.col);
    }

    function createCell(row, col, page, headerTexts) {
        const cell = document.createElement('div');
        cell.className = 'cell';

        const isHeader = page.kind === 'weekly' && row === 0;
        if (isHeader) {
            cell.classList.add('header-cell');
            cell.innerText = headerTexts[col];
            return cell;
        }

        const idx = getCellIndex(page.kind, row, col);
        const logicalRow = page.kind === 'weekly' ? row - 1 : row;
        const logicalCol = col;
        const input = document.createElement('textarea');
        const item = page.cells[idx] || { text: '', completed: false };
        input.value = item.text || '';
        input.spellcheck = false;
        input.setAttribute('autocorrect', 'off');
        input.setAttribute('autocomplete', 'off');
        input.setAttribute('autocapitalize', 'off');

        input.addEventListener('input', () => {
            centerTextareaContent(input);
            scheduleAutoSave();
        });
        input.addEventListener('focus', () => {
            centerTextareaContent(input);
            if (pendingCellRange && pendingCellRange.kind === page.kind) {
                setCellRange(
                    pendingCellRange.kind,
                    pendingCellRange.anchorRow,
                    pendingCellRange.anchorCol,
                    pendingCellRange.focusRow,
                    pendingCellRange.focusCol
                );
                pendingCellRange = null;
                return;
            }
            clearCellRange();
            cellRangeAnchor = { kind: page.kind, row: logicalRow, col: logicalCol };
            cellRangeFocus = { kind: page.kind, row: logicalRow, col: logicalCol };
        });
        input.addEventListener('blur', () => centerTextareaContent(input));
        input.addEventListener('paste', (event) => {
            const pastedText = event.clipboardData ? event.clipboardData.getData('text/plain') : '';
            const applied = applyGridPaste(page.kind, logicalRow, logicalCol, pastedText);
            if (!applied) {
                return;
            }
            event.preventDefault();
            focusCellByLogicalPosition(page.kind, logicalRow, logicalCol);
        });
        input.addEventListener('keydown', (event) => {
            if (event.key === 'Delete' && hasMultiCellRange()) {
                event.preventDefault();
                clearSelectedCells();
                return;
            }
            handleCellKeyboard(event, cell, page.kind, logicalRow, logicalCol);
        });

        cell.addEventListener('contextmenu', (event) => {
            event.preventDefault();
            cell.classList.toggle('completed');
            scheduleAutoSave();
        });

        cell.dataset.editable = '1';
        cell.dataset.kind = page.kind;
        cell.dataset.logicalRow = String(logicalRow);
        cell.dataset.logicalCol = String(logicalCol);
        if (item.completed) {
            cell.classList.add('completed');
        }

        cell.appendChild(input);

        return cell;
    }

    function renderStatus(text) {
        currentWeekLabel.textContent = text;
    }

    function renderNotebook(path) {
        selectedPath = path;
        clearCellRange();
        const page = getPageByPath(path);
        if (!page) {
            notebook.innerHTML = '';
            renderStatus('폴더 선택됨');
            renderNavigation(path);
            return;
        }

        let headerTexts = [];
        if (page.kind === 'weekly') {
            const parsed = parseWeekKey(page.weekKey);
            const monday = parsed ? mondayFromIsoWeek(parsed.year, parsed.week) : getMondayOfWeek();
            headerTexts = getHeaderTexts(monday);
        }

        notebook.innerHTML = '';
        for (let row = 0; row < GRID_ROWS; row++) {
            for (let col = 0; col < GRID_COLS; col++) {
                notebook.appendChild(createCell(row, col, page, headerTexts));
            }
        }

        centerAllTextareas();
        renderStatus(`현재: ${path}`);
        renderNavigation(path);
    }

    function buildTree(paths) {
        const root = {};
        paths.forEach((path) => {
            const parts = pathParts(path);
            let cursor = root;
            let currentPath = '';
            parts.forEach((part) => {
                currentPath = currentPath ? `${currentPath}::${part}` : part;
                if (!cursor[part]) {
                    cursor[part] = { __path: currentPath, __children: {} };
                }
                cursor = cursor[part].__children;
            });
        });
        return root;
    }

    function sortedEntries(obj) {
        return Object.entries(obj).sort((a, b) => a[0].localeCompare(b[0], 'ko'));
    }

    async function toggleCollapse(path) {
        if (collapsedSet.has(path)) {
            collapsedSet.delete(path);
        } else {
            collapsedSet.add(path);
        }
        await persistStore();
        renderAutoSavedStatus();
        renderNavigation(path);
    }

    function renderTreeNode(node, depth) {
        const row = document.createElement('div');
        row.className = 'tree-row';
        row.style.paddingLeft = `${8 + depth * 16}px`;
        row.dataset.path = node.__path;

        const childEntries = sortedEntries(node.__children);
        const hasChildren = childEntries.length > 0;

        const expander = document.createElement('span');
        expander.className = 'tree-expander';
        expander.textContent = hasChildren ? (collapsedSet.has(node.__path) ? '▶' : '▼') : '•';

        const label = document.createElement('span');
        label.className = `tree-label ${isPagePath(node.__path) ? 'page' : 'folder'}`;
        label.textContent = leafName(node.__path);

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'tree-delete-btn';
        deleteBtn.title = '삭제';
        deleteBtn.innerHTML = '🗑';
        deleteBtn.addEventListener('click', async (event) => {
            event.stopPropagation();
            const ok = confirm(`${node.__path} 경로를 삭제할까요?\n(하위 포함)`);
            if (!ok) { return; }
            await deletePath(node.__path);
        });

        row.appendChild(expander);
        row.appendChild(label);
        row.appendChild(deleteBtn);

        if (selectedPath === node.__path) {
            row.classList.add('active');
        }
        if (kbdPath === node.__path) {
            row.classList.add('kbd-focus');
        }

        row.addEventListener('click', () => {
            selectedPath = node.__path;
            kbdPath = node.__path;
            if (isPagePath(node.__path)) {
                renderNotebook(node.__path);
            } else {
                renderNavigation(node.__path);
                renderStatus(`폴더 선택: ${node.__path}`);
            }
        });

        row.addEventListener('dblclick', () => {
            if (hasChildren) {
                toggleCollapse(node.__path);
            }
        });

        weekList.appendChild(row);

        if (hasChildren && !collapsedSet.has(node.__path)) {
            childEntries.forEach(([, childNode]) => {
                renderTreeNode(childNode, depth + 1);
            });
        }
    }

    function renderNavigation(forceSelectPath = selectedPath) {
        ensureRootDecks();
        weekList.innerHTML = '';
        selectedPath = forceSelectPath || selectedPath;
        if (!kbdPath) {
            kbdPath = selectedPath;
        }

        const tree = buildTree(storeCache.decks);
        const topEntries = sortedEntries(tree);
        emptyNav.hidden = topEntries.length !== 0;

        topEntries.forEach(([, node]) => renderTreeNode(node, 0));

        if (!weekList.querySelector(`.tree-row[data-path="${CSS.escape(kbdPath || '')}"]`)) {
            const firstRow = weekList.querySelector('.tree-row');
            if (firstRow) {
                kbdPath = firstRow.dataset.path;
                firstRow.classList.add('kbd-focus');
            }
        }
    }

    function getVisibleTreeRows() {
        return Array.from(weekList.querySelectorAll('.tree-row'));
    }

    function isRowExpanded(path) {
        return !collapsedSet.has(path);
    }

    function pathDepth(path) {
        return pathParts(path).length;
    }

    function getChildrenPaths(path) {
        const baseDepth = pathDepth(path);
        const prefix = `${path}::`;
        return storeCache.decks.filter((d) => parentPath(d) === path).sort((a, b) => leafName(a).localeCompare(leafName(b), 'ko'));
    }

    function parentPath(path) {
        const idx = path.lastIndexOf('::');
        return idx === -1 ? '' : path.slice(0, idx);
    }

    function focusKbdPath(path) {
        kbdPath = path;
        const rows = getVisibleTreeRows();
        rows.forEach((row) => row.classList.toggle('kbd-focus', row.dataset.path === path));
        const target = rows.find((row) => row.dataset.path === path);
        if (target) {
            target.scrollIntoView({ block: 'nearest' });
        }
    }

    function openPath(path) {
        selectedPath = path;
        if (isPagePath(path)) {
            renderNotebook(path);
        } else {
            renderNavigation(path);
            renderStatus(`폴더 선택: ${path}`);
        }
        focusKbdPath(path);
    }

    function renamePath(oldPath, newPath) {
        storeCache.decks = storeCache.decks.map((path) => {
            if (path === oldPath || path.startsWith(`${oldPath}::`)) {
                return path.replace(oldPath, newPath);
            }
            return path;
        });
        storeCache.decks = [...new Set(storeCache.decks)];

        const newPages = {};
        Object.keys(storeCache.pages).forEach((path) => {
            let target = path;
            if (path === oldPath || path.startsWith(`${oldPath}::`)) {
                target = path.replace(oldPath, newPath);
            }
            newPages[target] = storeCache.pages[path];
            if (newPages[target].kind === 'weekly') {
                newPages[target].weekKey = leafName(target);
                newPages[target].title = leafName(target);
            } else if (newPages[target].kind === 'untitled') {
                newPages[target].title = leafName(target);
            }
        });
        storeCache.pages = newPages;

        collapsedSet = new Set(Array.from(collapsedSet).map((path) => {
            if (path === oldPath || path.startsWith(`${oldPath}::`)) {
                return path.replace(oldPath, newPath);
            }
            return path;
        }));
    }

    async function deletePath(path) {
        storeCache.decks = storeCache.decks.filter((d) => d !== path && !d.startsWith(`${path}::`));
        Object.keys(storeCache.pages).forEach((p) => {
            if (p === path || p.startsWith(`${path}::`)) {
                delete storeCache.pages[p];
            }
        });
        collapsedSet = new Set(Array.from(collapsedSet).filter((p) => p !== path && !p.startsWith(`${path}::`)));
        ensureRootDecks();

        if (selectedPath === path || selectedPath.startsWith(`${path}::`)) {
            const nextPage = Object.keys(storeCache.pages)[0] || '';
            selectedPath = nextPage;
        }

        await persistStore();
        if (selectedPath && isPagePath(selectedPath)) {
            renderNotebook(selectedPath);
        } else {
            notebook.innerHTML = '';
            renderStatus('페이지가 없습니다. weekly 또는 무제 버튼으로 생성하세요.');
            renderNavigation(selectedPath);
        }
    }

    async function createWeeklyPage() {
        setMode('weekly');

        const monday = getMondayOfWeek();
        const weekKey = makeWeekKey(monday);
        const deckPath = resolveTargetDeckForCreate();
        const path = `${deckPath}::${weekKey}`;

        if (!storeCache.pages[path]) {
            addDeckWithParents(path);
            storeCache.pages[path] = {
                kind: 'weekly',
                weekKey,
                title: weekKey,
                cells: [],
                savedAt: Date.now()
            };
            await persistStore();
            renderAutoSavedStatus();
        }

        renderNavigation(path);
        renderNotebook(path);
    }

    async function createUntitledPage() {
        setMode('untitled');

        const deckPath = resolveTargetDeckForCreate();
        let index = 1;
        let title = `무제 ${index}`;
        let path = `${deckPath}::${title}`;
        while (storeCache.pages[path]) {
            index += 1;
            title = `무제 ${index}`;
            path = `${deckPath}::${title}`;
        }

        addDeckWithParents(path);
        storeCache.pages[path] = {
            kind: 'untitled',
            title,
            cells: [],
            savedAt: Date.now()
        };
        await persistStore();
        renderAutoSavedStatus();

        renderNavigation(path);
        renderNotebook(path);
    }

    function startInlineCreateDeck(parentDeckPath = '') {
        renderNavigation(selectedPath);

        const row = document.createElement('div');
        row.className = 'tree-row';
        const depth = parentDeckPath ? pathDepth(parentDeckPath) : 0;
        row.style.paddingLeft = `${8 + depth * 16}px`;

        const expander = document.createElement('span');
        expander.className = 'tree-expander';
        expander.textContent = '•';

        const input = document.createElement('input');
        input.className = 'tree-inline-input';
        input.placeholder = parentDeckPath ? '하위 덱 이름' : '최상위 덱 이름';
        input.spellcheck = false;
        input.autocomplete = 'off';

        row.appendChild(expander);
        row.appendChild(input);

        const parentRow = parentDeckPath
            ? weekList.querySelector(`.tree-row[data-path="${CSS.escape(parentDeckPath)}"]`)
            : null;
        if (parentRow) {
            parentRow.insertAdjacentElement('afterend', row);
        } else {
            weekList.prepend(row);
        }

        input.focus();

        let committed = false;

        async function commit() {
            if (committed) {
                return;
            }
            committed = true;

            const name = input.value.trim();
            if (!name) {
                renderNavigation(selectedPath);
                return;
            }

            const path = parentDeckPath ? `${parentDeckPath}::${name}` : name;
            if (storeCache.decks.includes(path) || storeCache.pages[path]) {
                renderStatus('이미 존재하는 경로입니다.');
                renderNavigation(selectedPath);
                return;
            }

            addDeckWithParents(path);
            if (parentDeckPath) {
                collapsedSet.delete(parentDeckPath);
            }

            selectedPath = path;
            kbdPath = path;
            await persistStore();
            renderAutoSavedStatus();
            renderNavigation(path);
        }

        function cancel() {
            if (committed) {
                return;
            }
            committed = true;
            renderNavigation(selectedPath);
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                commit();
            } else if (e.key === 'Escape') {
                e.preventDefault();
                cancel();
            }
            e.stopPropagation();
        });
        input.addEventListener('blur', cancel);
    }

    async function cmdAddTopDeck() {
        startInlineCreateDeck('');
    }

    async function cmdAddSubDeck() {
        if (!selectedPath) {
            renderStatus('부모 경로를 먼저 선택하세요.');
            return;
        }
        if (isPagePath(selectedPath)) {
            renderStatus('페이지 아래에는 하위 폴더를 만들 수 없습니다. 폴더를 선택하세요.');
            return;
        }

        startInlineCreateDeck(selectedPath);
    }

    function startInlineRename() {
        if (!selectedPath) { return; }
        const row = weekList.querySelector(`.tree-row[data-path="${CSS.escape(selectedPath)}"]`);
        if (!row) { return; }
        const labelEl = row.querySelector('.tree-label');
        if (!labelEl) { return; }

        const input = document.createElement('input');
        input.className = 'tree-inline-input';
        input.value = selectedPath;
        input.spellcheck = false;
        input.autocomplete = 'off';
        labelEl.replaceWith(input);
        input.focus();
        input.select();

        let committed = false;

        async function commit() {
            if (committed) { return; }
            committed = true;
            const newFullPath = input.value.trim();
            if (!newFullPath || newFullPath === selectedPath) {
                renderNavigation(selectedPath);
                return;
            }
            if (storeCache.decks.includes(newFullPath)) {
                renderNavigation(selectedPath);
                return;
            }
            renamePath(selectedPath, newFullPath);
            selectedPath = newFullPath;
            kbdPath = newFullPath;
            await persistStore();
            renderAutoSavedStatus();
            if (isPagePath(newFullPath)) { renderNotebook(newFullPath); }
            renderNavigation(newFullPath);
        }

        function cancel() {
            if (committed) { return; }
            committed = true;
            renderNavigation(selectedPath);
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); commit(); }
            else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
            e.stopPropagation();
        });
        input.addEventListener('blur', cancel);
    }

    async function cmdRenameDeck() {
        startInlineRename();
    }

    async function showDeckPicker() {
        if (!selectedPath || !isPagePath(selectedPath)) {
            alert('페이지를 먼저 선택한 뒤 m을 눌러주세요.');
            return;
        }

        const picker = document.getElementById('deckPicker');
        const sidebar = document.querySelector('.sidebar');
        const rect = sidebar.getBoundingClientRect();
        picker.style.left = rect.left + 'px';
        picker.style.top = rect.top + 'px';
        picker.style.width = rect.width + 'px';
        picker.innerHTML = '';

        const tree = buildTree(storeCache.decks);
        const movingPagePath = selectedPath;
        const movingLeaf = leafName(movingPagePath);

        const deckPaths = storeCache.decks
            .filter((path) => !isPagePath(path))
            .sort((a, b) => a.localeCompare(b, 'ko'));
        const deckPathSet = new Set(deckPaths);

        function renderPickerNode(node, depth) {
            if (!deckPathSet.has(node.__path)) {
                const childrenOnly = sortedEntries(node.__children);
                childrenOnly.forEach(([, child]) => renderPickerNode(child, depth + 1));
                return;
            }

            const item = document.createElement('div');
            item.className = 'deck-picker-item is-folder';
            item.style.paddingLeft = `${8 + depth * 16}px`;

            const exp = document.createElement('span');
            exp.style.cssText = 'width:12px;flex-shrink:0;font-size:0.65rem;color:#5d7390;text-align:center;';
            const children = sortedEntries(node.__children);
            exp.textContent = children.length > 0 ? '▶' : '•';
            item.appendChild(exp);

            const lbl = document.createElement('span');
            lbl.textContent = node.__path;
            lbl.title = node.__path;
            lbl.style.cssText = 'flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;';
            item.appendChild(lbl);

            item.addEventListener('mousedown', async (e) => {
                e.preventDefault();
                const targetPath = `${node.__path}::${movingLeaf}`;
                if (targetPath === movingPagePath) {
                    closePicker();
                    return;
                }
                if (storeCache.decks.includes(targetPath) || storeCache.pages[targetPath]) {
                    alert('같은 이름의 경로가 이미 있어 이동할 수 없습니다.');
                    return;
                }

                renamePath(movingPagePath, targetPath);
                selectedPath = targetPath;
                await persistStore();
                closePicker();
                renderNavigation(targetPath);
                renderNotebook(targetPath);
                focusKbdPath(targetPath);
            });
            picker.appendChild(item);

            children.forEach(([, child]) => renderPickerNode(child, depth + 1));
        }

        sortedEntries(tree).forEach(([, node]) => renderPickerNode(node, 0));

        picker.classList.add('open');

        function closePicker() {
            picker.classList.remove('open');
            document.removeEventListener('mousedown', outsideClick);
        }

        function outsideClick(e) {
            if (!picker.contains(e.target)) { closePicker(); }
        }

        setTimeout(() => document.addEventListener('mousedown', outsideClick), 0);
    }

    async function cmdDeleteDeck() {
        if (!selectedPath) {
            return;
        }
        const ok = confirm(`'${selectedPath}' 경로와 하위를 삭제할까요?`);
        if (!ok) {
            return;
        }
        await deletePath(selectedPath);
    }

    async function cmdCollapseAll() {
        const tree = buildTree(storeCache.decks);
        const collect = (obj) => {
            sortedEntries(obj).forEach(([, node]) => {
                const children = sortedEntries(node.__children);
                if (children.length > 0) {
                    collapsedSet.add(node.__path);
                    collect(node.__children);
                }
            });
        };
        collect(tree);
        await persistStore();
        renderNavigation(selectedPath);
    }

    function showHelp() {
        alert(
            '단축키 도움말\n' +
            'weekly 버튼: 선택한 덱 안에 주간 페이지 생성\n' +
            '무제 버튼: 선택한 덱 안에 무제 페이지 생성\n' +
            't: 최상위 덱 추가\n' +
            'n: 하위 덱 추가\n' +
            'b: 이름/경로 변경 (Enter 저장, Esc 취소)\n' +
            'm: 선택 페이지를 다른 덱으로 이동\n' +
            'Del: 선택 경로 삭제\n' +
            '휴지통 버튼: 해당 경로 삭제\n' +
            'x: 트리 전체 접기\n' +
            '?: 도움말\n' +
            '/: 첫 항목 포커스\n' +
            '↑/↓: 트리 이동\n' +
            '←: 접기/부모 이동\n' +
            '→: 펼치기/첫 자식 이동\n' +
            'Enter: 선택 열기\n\n' +
            '셀 안에서 /: X 표시 토글\n' +
            '셀 안에서 Ctrl+방향키: 다른 셀로 이동'
        );
    }

    function toKoreanShortcut(key) {
        const map = {
            'ㅅ': 't',
            'ㅜ': 'n',
            'ㅠ': 'b',
            'ㅌ': 'x',
            'ㅡ': 'm'
        };
        return map[key] || key;
    }

    function bindClipboardShortcuts() {
        document.addEventListener('copy', (event) => {
            const range = getNormalizedCellRange();
            if (!range) {
                return;
            }
            if (range.startRow === range.endRow && range.startCol === range.endCol) {
                return;
            }

            const active = document.activeElement;
            if (active && active.tagName && active.tagName.toLowerCase() === 'textarea') {
                if (typeof active.selectionStart === 'number' && active.selectionStart !== active.selectionEnd) {
                    return;
                }
            }

            const text = buildCellRangeText();
            if (!text) {
                return;
            }
            event.preventDefault();
            event.clipboardData.setData('text/plain', text);
        });
    }

    function bindShortcuts() {
        document.addEventListener('keydown', (event) => {
            const tag = event.target && event.target.tagName ? event.target.tagName.toLowerCase() : '';
            if (tag === 'textarea') {
                return;
            }

            const rows = getVisibleTreeRows();
            const currentIndex = rows.findIndex((row) => row.dataset.path === kbdPath);
            const currentPath = currentIndex >= 0 ? rows[currentIndex].dataset.path : '';

            if (event.key === 'Delete') {
                event.preventDefault();
                if (hasMultiCellRange()) {
                    clearSelectedCells();
                    return;
                }
                cmdDeleteDeck();
                return;
            }

            let key = event.key || '';
            key = key.toLowerCase();
            key = toKoreanShortcut(key);

            if (key === 'arrowup') {
                event.preventDefault();
                if (rows.length === 0) {
                    return;
                }
                const nextIndex = currentIndex <= 0 ? 0 : currentIndex - 1;
                openPath(rows[nextIndex].dataset.path);
                return;
            }

            if (key === 'arrowdown') {
                event.preventDefault();
                if (rows.length === 0) {
                    return;
                }
                const nextIndex = currentIndex < 0 ? 0 : Math.min(rows.length - 1, currentIndex + 1);
                openPath(rows[nextIndex].dataset.path);
                return;
            }

            if (key === 'arrowleft') {
                event.preventDefault();
                if (!currentPath) {
                    return;
                }
                const hasChildren = getChildrenPaths(currentPath).length > 0;
                if (hasChildren && isRowExpanded(currentPath)) {
                    toggleCollapse(currentPath);
                    openPath(currentPath);
                    return;
                }
                const parent = parentPath(currentPath);
                if (parent) {
                    openPath(parent);
                }
                return;
            }

            if (key === 'arrowright') {
                event.preventDefault();
                if (!currentPath) {
                    return;
                }
                const children = getChildrenPaths(currentPath);
                if (children.length === 0) {
                    return;
                }
                if (!isRowExpanded(currentPath)) {
                    toggleCollapse(currentPath);
                    openPath(currentPath);
                    return;
                }
                openPath(children[0]);
                return;
            }

            if (key === 'enter') {
                event.preventDefault();
                if (currentPath) {
                    openPath(currentPath);
                }
                return;
            }

            if (key === '/') {
                event.preventDefault();
                if (rows.length > 0) {
                    focusKbdPath(rows[0].dataset.path);
                }
                return;
            }

            if (key === 't') {
                event.preventDefault();
                cmdAddTopDeck();
            } else if (key === 'n') {
                event.preventDefault();
                cmdAddSubDeck();
            } else if (key === 'b') {
                event.preventDefault();
                cmdRenameDeck();
            } else if (key === 'm') {
                event.preventDefault();
                showDeckPicker();
            } else if (key === 'x') {
                event.preventDefault();
                cmdCollapseAll();
            } else if (key === '?') {
                event.preventDefault();
                showHelp();
            }
        });
    }

    async function initialize() {
        const raw = await storageBridge.load();
        storeCache = normalizeStore(raw);
        refreshAfterStoreChange();
    }

    helpBtn.addEventListener('click', showHelp);
    weeklyBtn.addEventListener('click', createWeeklyPage);
    untitledBtn.addEventListener('click', createUntitledPage);
    importBtn.addEventListener('click', () => {
        importFileInput.value = '';
        importFileInput.click();
    });
    exportBtn.addEventListener('click', exportStoreAsJson);
    importFileInput.addEventListener('change', async (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) {
            return;
        }
        try {
            await importStoreFromFile(file);
            alert(`불러오기 완료\n파일명: ${file.name}`);
        } catch (error) {
            console.error('JSON 불러오기 실패:', error);
            alert('JSON 불러오기에 실패했습니다. 파일 형식을 확인하세요.');
        } finally {
            importFileInput.value = '';
        }
    });

    window.addEventListener('resize', centerAllTextareas);

    bindShortcuts();
    bindClipboardShortcuts();
    window.addEventListener('pywebviewready', initialize);
    initialize();
</script>
